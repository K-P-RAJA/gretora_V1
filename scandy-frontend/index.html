    <!-- Google Structured Data (SEO Application Schema) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Scandy",
      "operatingSystem": "All",
      "applicationCategory": "MultimediaApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Convert any video message into a scannable QR code gift. Personalized video greeting cards for birthdays, weddings, and every milestone.",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "128"
      }

    </script>

    <!-- Google Structured Data (FAQ Schema) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "What exactly is Scandy?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Scandy is a free web platform that converts any video message into a scannable QR code. You upload a video, we generate a unique QR code, and you print it on any physical item — a card, frame, or gift tag. When someone scans it, the video plays instantly in their browser."
        }
      }, {
        "@type": "Question",
        "name": "Is Scandy really free?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes — completely. Your first 3 video QR codes are free forever. No credit card required, no trial period, no hidden charges. We generate revenue through non-intrusive ads on the upload and dashboard pages — never on the watch page."
        }
      }, {
        "@type": "Question",
        "name": "Does the person scanning need an app?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Any modern smartphone — iPhone or Android — can scan a QR code using the built-in camera app. No download, no account, no friction."
        }
      }]
    }
    </script>
